<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Login | CyberShieldAI</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#1e293b;
padding:40px;
width:350px;
border-radius:10px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:6px;
background:#0f172a;
color:white;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#06b6d4;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

a{
display:block;
margin-top:15px;
color:#06b6d4;
text-decoration:none;
}

</style>

</head>

<body>

<div class="login-box">

<h2>CyberShieldAI Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<a href="/register">Create Account</a>

</div>

</body>
</html>
